name: import
on: push
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git clone --depth 1 --branch claude/context-engineering-setup-dEcOk https://github.com/rosalinatorres888/career-intelligence-system.git /tmp/src
          rsync -a /tmp/src/quant-analytics/ ./ --exclude .git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import quant-analytics library" || exit 0
          git push
